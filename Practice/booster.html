<!DOCTYPE html>
<html>

<head>
  <title>Bootstrap Buttons Exercise</title> <!--INCLUDING BOOTSTRAP-->

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
  <section class="container mt-4">
    <div class="card">
      <div class="card-body">
        <h1 class="text-white bg-dark text-center">Bad News</h1>
        <div class="alert alert-warning" role="alert"> You are going to die one day! It sucks, but it's normal :( </div>
        <button class="btn btn-success">Come To Terms With</button>
        <button class="btn btn-danger">Continue To Deny</button>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
